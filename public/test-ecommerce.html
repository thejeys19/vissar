<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - E-commerce Site</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Simulating a Shopify/WooCommerce style */
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #faf9fb;
            color: #1a1a1a;
            line-height: 1.6;
        }
        
        .header {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #111;
            letter-spacing: -0.5px;
        }
        
        .nav a {
            color: #666;
            text-decoration: none;
            margin-left: 30px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .nav a:hover { color: #111; }
        
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 80px 40px;
            text-align: center;
        }
        
        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 20px;
        }
        
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
        }
        
        .reviews-section {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            margin: 40px 0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #111;
        }
        
        /* Dark section test */
        .dark-section {
            background: #0f0f0f;
            color: #fff;
            padding: 60px 40px;
            margin: 40px -40px;
        }
        
        .dark-section .section-title {
            color: #fff;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">LUXE STORE</div>
        <nav class="nav">
            <a href="#">Shop</a>
            <a href="#">Collections</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    
    <section class="hero">
        <h1>Premium Products</h1>
        <p>Quality you can trust. See what our customers say.</p>
    </section>
    
    <div class="content">
        <div class="reviews-section">
            <h2 class="section-title">What Customers Say</h2>
            <!-- Vissar Widget - Carousel on light background -->
            <div data-vissar-widget="luxe-store" data-vissar-layout="carousel" data-vissar-max-reviews="5"></div>
        </div>
        
        <div class="reviews-section">
            <h2 class="section-title">More Reviews</h2>
            <!-- Grid layout -->
            <div data-vissar-widget="luxe-store-grid" data-vissar-layout="grid" data-vissar-max-reviews="6"></div>
        </div>
        
        <div class="dark-section">
            <h2 class="section-title">Customer Love</h2>
            <!-- Widget on dark background -->
            <div data-vissar-widget="luxe-store-dark" data-vissar-layout="list" data-vissar-max-reviews="4"></div>
        </div>
    </div>
    
    <!-- Load Vissar Widget -->
    <script src="./widget/vissar-widget.min.js"></script>
</body>
</html>
