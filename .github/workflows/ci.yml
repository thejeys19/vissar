name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dashboard
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './dashboard/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        
      - name: Type check
        run: npm run type-check || true
        
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_URL || 'https://vissar.vercel.app' }}
